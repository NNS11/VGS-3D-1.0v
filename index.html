<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGS 3D | Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primaria: #1a1a1a; --destaque: #f7e017; --bg: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-bottom: 90px; overflow-x: hidden; }
        
        header { background: var(--primaria); padding: 25px; text-align: center; position: sticky; top: 0; z-index: 100; border-bottom: 4px solid var(--destaque); animation: slideDown 0.5s ease; }
        .logo { color: white; font-weight: 900; font-size: 26px; font-style: italic; letter-spacing: -2px; text-transform: uppercase; }

        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; max-width: 600px; margin: 0 auto; }
        
        .card { 
            background: #f9f9f9; border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; 
            display: flex; flex-direction: column; animation: fadeInUp 0.6s ease forwards; opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #eee;
        }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card .info { padding: 12px; }
        .card h3 { font-size: 13px; font-weight: 900; line-height: 1.2; text-transform: uppercase; margin-bottom: 6px; color: var(--primaria); }
        .card .price { font-weight: 900; color: #000; font-size: 16px; background: var(--destaque); display: inline-block; padding: 2px 6px; }

        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: var(--primaria); display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 15px 0; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: white; text-decoration: none; transition: 0.3s; }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; fill: white; }
        .nav-item span { font-size: 10px; font-weight: 900; text-transform: uppercase; opacity: 0.7; }
        .nav-item:active { transform: translateY(-5px); color: var(--destaque); }
        .nav-item:active svg { fill: var(--destaque); }
    </style>
</head>
<body>
    <header><div class="logo">VGS 3D</div></header>
    <div style="padding:30px 20px; text-align:center"><h2 style="font-weight:900; font-size:32px; letter-spacing:-2px; line-height:0.9">QUALIDADE<br>DE ROTINA.</h2></div>
    
    <div class="grid" id="vitrine"></div>

    <nav class="nav-bottom">
        <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span></a>
        <a href="categorias.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm7 0h5v-6h-5v6zm0-13v6h5V5h-5z"/></svg><span>Cats</span></a>
        <a href="busca.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span>Busca</span></a>
    </nav>

    <script src="dados.js"></script>
    <script>
        document.getElementById('vitrine').innerHTML = PRODUTOS.map((p, i) => `
            <a href="produto.html?id=${p.id}" class="card" style="animation-delay: ${i * 0.1}s">
                <img src="${p.fotos[0]}">
                <div class="info"><h3>${p.nome}</h3><p class="price">R$ ${p.precoDesconto}</p></div>
            </a>
        `).join('');
    </script>
</body>
</html>
