<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGS 3D | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primaria: #333333; --secundaria: #ffdf00; --dark: #111; --bg: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--dark); padding-bottom: 80px; }

        header { background: var(--primaria); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; cursor: pointer;}
        .logo { color: white; font-weight: 900; font-size: 22px; font-style: italic; }

        .search-box { padding: 10px 15px; display: none; background: white; border-bottom: 1px solid #ddd; }
        .search-box input { width: 100%; padding: 12px; border: 2px solid var(--primaria); border-radius: 8px; outline: none; font-weight: 700; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 8px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-decoration: none; color: inherit; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card .info { padding: 8px; }
        .card h3 { font-size: 12px; font-weight: 700; height: 30px; overflow: hidden; margin-bottom: 4px; }
        .card .price { font-weight: 900; font-size: 14px; }

        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: var(--primaria); display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 12px 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: white; cursor: pointer; }
        .nav-item svg { width: 20px; height: 20px; margin-bottom: 4px; fill: white; }
        .nav-item span { font-size: 9px; font-weight: 900; text-transform: uppercase; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 85%; padding: 25px; border-radius: 12px; }
        .cat-btn { display: block; width: 100%; padding: 15px; margin-bottom: 8px; background: var(--primaria); color: white; border: none; font-weight: 900; border-radius: 6px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header onclick="window.scrollTo({top:0, behavior:'smooth'})">
        <div class="logo">VGS 3D</div>
    </header>

    <div class="search-box" id="searchBox">
        <input type="text" id="searchInput" placeholder="PESQUISAR..." oninput="filtrar()">
    </div>

    <div class="grid" id="vitrine"></div>

    <div class="modal" id="modalCat">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:15px; font-weight:900">CATEGORIAS</h2>
            <div id="catList"></div>
            <p onclick="toggleModal()" style="text-align:center; margin-top:15px; font-weight:900; color:#999">FECHAR</p>
        </div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item" onclick="location.reload()">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Início</span>
        </div>
        <div class="nav-item" onclick="toggleModal()">
            <svg viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm7 0h5v-6h-5v6zm0-13v6h5V5h-5z"/></svg>
            <span>Categorias</span>
        </div>
        <div class="nav-item" onclick="toggleSearch()">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span>Buscar</span>
        </div>
    </nav>

    <script src="dados.js"></script>
    <script>
        function render(lista) {
            const v = document.getElementById('vitrine');
            v.innerHTML = lista.map(p => `
                <a href="produto.html?id=${p.id}" class="card">
                    <img src="${p.foto}">
                    <div class="info">
                        <h3>${p.nome}</h3>
                        <p class="price">R$ ${p.precoDesconto}</p>
                    </div>
                </a>
            `).join('');
        }

        function toggleSearch() {
            const s = document.getElementById('searchBox');
            if(s.style.display === 'block') { s.style.display = 'none'; render(PRODUTOS); }
            else { s.style.display = 'block'; s.querySelector('input').focus(); }
        }

        function filtrar() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            render(PRODUTOS.filter(p => p.nome.toLowerCase().includes(val) || p.tags.some(t => t.includes(val))));
        }

        function toggleModal() {
            const m = document.getElementById('modalCat');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
            const cats = [...new Set(PRODUTOS.map(p => p.categoria))];
            document.getElementById('catList').innerHTML = cats.map(c => `<button class="cat-btn" onclick="filtrarCat('${c}')">${c}</button>`).join('');
        }

        function filtrarCat(c) { render(PRODUTOS.filter(p => p.categoria === c)); toggleModal(); }

        window.onload = () => render(PRODUTOS);
    </script>
</body>
</html>
