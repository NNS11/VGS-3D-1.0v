<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGS 3D | Produto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primaria: #333; --destaque: #FFDF00; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: white; padding-bottom: 140px; }
        .back-bar { position: sticky; top:0; background:white; padding:15px; border-bottom:1px solid #eee; z-index:100; }
        .img-main { width:100%; aspect-ratio: 1/1; object-fit: cover; }
        .content { padding: 20px; max-width:600px; margin:0 auto; }
        .tag { color:#999; font-size:10px; font-weight:900; text-transform:uppercase; }
        .title { font-size:28px; font-weight:900; text-transform:uppercase; margin:5px 0; letter-spacing:-1px; }
        .new-price { font-size:32px; font-weight:900; display:block; margin:10px 0; }
        .specs { width:100%; border-collapse:collapse; background:var(--primaria); color:var(--destaque); font-size:12px; margin-top:20px; }
        .specs td { padding:12px; border: 1px solid rgba(255,255,255,0.1); }
        .fixed-buy { position:fixed; bottom:0; left:0; width:100%; background:white; padding:20px; box-shadow: 0 -10px 20px rgba(0,0,0,0.05); }
        .btn-zap { display:block; background:var(--destaque); color:#111; padding:20px; text-align:center; text-decoration:none; font-weight:900; border-radius:12px; font-size:18px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    </style>
</head>
<body>
    <div class="back-bar"><a href="index.html" style="text-decoration:none; color:#111; font-weight:900;">← VOLTAR</a></div>
    <div id="target"></div>
    <script src="dados.js"></script>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const p = PRODUTOS.find(i => i.id == id);
        if(!p) window.location.href = 'index.html';
        document.getElementById('target').innerHTML = `
            <img src="${p.foto}" class="img-main">
            <div class="content">
                <span class="tag">${p.categoria}</span>
                <h1 class="title">${p.nome}</h1>
                <span class="new-price">R$ ${p.precoDesconto}</span>
                <p style="line-height:1.6; color:#444;">${p.descricao}</p>
                <div style="margin-top:25px"><h4 style="font-weight:900">DETALHES</h4>${p.detalhes.map(d => `<p style="font-size:14px; margin-top:5px">• ${d}</p>`).join('')}</div>
                <table class="specs">${p.tabela.map(r => `<tr><td style="font-weight:900">${r[0]}</td><td style="text-align:right">${r[1]}</td></tr>`).join('')}</table>
            </div>
            <div class="fixed-buy"><a href="${gerarLinkZap(p.nome)}" target="_blank" class="btn-zap">ADQUIRIR ESTE ITEM</a></div>
        `;
    </script>
</body>
</html>
