<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGS 3D | Detalhes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primaria: #333; --secundaria: #ffdf00; --dark: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: white; padding-bottom: 140px; }

        .back-bar { position: sticky; top: 0; background: white; padding: 15px; z-index: 100; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .back-link { text-decoration: none; color: var(--dark); font-weight: 900; font-size: 14px; }

        .main-img { width: 100%; background: #f9f9f9; }
        .content { padding: 20px; max-width: 600px; margin: 0 auto; }
        .cat-tag { color: #999; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .title { font-size: 26px; font-weight: 900; text-transform: uppercase; margin: 5px 0; letter-spacing: -1px; }
        .price-row { margin: 15px 0; }
        .old { text-decoration: line-through; color: #999; font-size: 14px; }
        .new { font-size: 32px; font-weight: 900; display: block; }

        .desc { line-height: 1.6; color: #444; margin: 20px 0; font-size: 15px; }
        .specs { width: 100%; border-collapse: collapse; background: var(--primaria); color: var(--secundaria); font-size: 12px; margin-top: 20px; }
        .specs td { padding: 12px; border: 1px solid rgba(255,255,255,0.1); }

        .fixed-buy { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 20px; box-shadow: 0 -10px 20px rgba(0,0,0,0.05); z-index: 500; }
        .btn-flash { 
            display: block; background: var(--secundaria); color: var(--dark); 
            padding: 20px; text-align: center; text-decoration: none; 
            font-weight: 900; border-radius: 12px; font-size: 18px;
            animation: pulse 2s infinite; box-shadow: 0 4px 15px rgba(255,223,0,0.4);
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    </style>
</head>
<body>

    <div class="back-bar">
        <a href="index.html" class="back-link">← VOLTAR</a>
        <span style="font-weight:900; font-style:italic">VGS 3D</span>
    </div>

    <div id="productDetail"></div>

    <script src="dados.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id'));
        const p = PRODUTOS.find(item => item.id === id);

        if(!p) { window.location.href = 'index.html'; }

        document.getElementById('productDetail').innerHTML = `
            <img src="${p.foto}" class="main-img">
            <div class="content">
                <span class="cat-tag">${p.categoria}</span>
                <h1 class="title">${p.nome}</h1>
                <p style="font-weight:700; font-size:13px; color:var(--primaria)">${p.subtitulo}</p>
                
                <div class="price-row">
                    <span class="old">R$ ${p.precoOriginal}</span>
                    <span class="new">R$ ${p.precoDesconto}</span>
                </div>

                <div class="desc">${p.descricao}</div>

                <div style="margin-top:30px">
                    <h4 style="font-weight:900; margin-bottom:10px">DETALHES</h4>
                    ${p.detalhes.map(d => `<p style="font-size:14px; margin-bottom:4px">• ${d}</p>`).join('')}
                </div>

                <table class="specs">
                    ${p.tabela.map(row => `<tr><td style="font-weight:900">${row[0]}</td><td style="text-align:right">${row[1]}</td></tr>`).join('')}
                </table>
            </div>

            <div class="fixed-buy">
                <a href="${p.linkCompra}" target="_blank" class="btn-flash">ADQUIRIR AGORA</a>
            </div>
        `;
    </script>
</body>
</html>
