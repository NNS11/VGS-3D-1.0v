<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGS 3D | Buscar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primaria: #1a1a1a; --destaque: #f7e017; --bg: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); padding-bottom: 90px; }
        .search-area { background: var(--primaria); padding: 50px 20px; text-align: center; }
        input { width: 100%; max-width: 500px; padding: 18px; border: none; border-radius: 12px; font-size: 16px; outline: none; font-weight: 900; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; border: 1px solid #eee; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: var(--primaria); display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 15px 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: white; text-decoration: none; }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: white; }
        .nav-item span { font-size: 10px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="search-area"><input type="text" id="box" placeholder="O QUE VOCÊ BUSCA?" oninput="buscar()"></div>
    <div class="grid" id="res"></div>
    <nav class="nav-bottom">
        <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span></a>
        <a href="categorias.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm7 0h5v-6h-5v6zm0-13v6h5V5h-5z"/></svg><span>Categorias</span></a>
        <a href="busca.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span>Buscar</span></a>
    </nav>
    <script src="dados.js"></script>
    <script>
        function buscar() {
            const t = document.getElementById('box').value.toLowerCase();
            const filtered = PRODUTOS.filter(p => p.nome.toLowerCase().includes(t));
            document.getElementById('res').innerHTML = filtered.map(p => `
                <a href="produto.html?id=${p.id}" class="card"><img src="${p.fotos[0]}"><div class="info" style="padding:10px"><h3 style="font-size:12px; font-weight:900">${p.nome}</h3><p style="font-weight:900">R$ ${p.precoDesconto}</p></div></a>
            `).join('');
        }
    </script>
</body>
</html>
