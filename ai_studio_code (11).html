<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGS 3D | Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primaria: #333; --destaque: #FFDF00; --bg: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-bottom: 80px; }
        header { background: var(--primaria); padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .logo { color: white; font-weight: 900; font-size: 22px; font-style: italic; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card .info { padding: 10px; flex-grow: 1; }
        .card h3 { font-size: 13px; font-weight: 700; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 5px; }
        .card .price { font-weight: 900; color: #111; font-size: 15px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: var(--primaria); display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 12px 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: white; text-decoration: none; }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: white; }
        .nav-item span { font-size: 9px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>
    <header> <div class="logo">VGS 3D</div> </header>
    <div class="grid" id="vitrine"></div>
    <nav class="nav-bottom">
        <a href="index.html" class="nav-item"> <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> <span>Início</span> </a>
        <a href="categorias.html" class="nav-item"> <svg viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm7 0h5v-6h-5v6zm0-13v6h5V5h-5z"/></svg> <span>Categorias</span> </a>
        <a href="busca.html" class="nav-item"> <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg> <span>Buscar</span> </a>
    </nav>
    <script src="dados.js"></script>
    <script>
        document.getElementById('vitrine').innerHTML = PRODUTOS.map(p => `
            <a href="produto.html?id=${p.id}" class="card">
                <img src="${p.foto}">
                <div class="info"><h3>${p.nome}</h3><p class="price">R$ ${p.precoDesconto}</p></div>
            </a>
        `).join('');
    </script>
</body>
</html>
